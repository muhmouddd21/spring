version: "3.8"

services:
  db:
    image: postgres
    container_name: postgres-db
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: java-app
    depends_on:
      - db
    ports:
      - "8080:8080"